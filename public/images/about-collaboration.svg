<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" fill="none" role="img" aria-label="Illustration of a technology team collaborating">
  <defs>
    <linearGradient id="ab-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b62f4"/>
      <stop offset="1" stop-color="#2544e0"/>
    </linearGradient>
    <linearGradient id="ab-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21cdee"/>
      <stop offset="1" stop-color="#06b0d4"/>
    </linearGradient>
    <filter id="ab-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1e2f9e" flood-opacity="0.16"/>
    </filter>
  </defs>

  <circle cx="140" cy="130" r="120" fill="#dbe7ff" opacity="0.7"/>
  <circle cx="520" cy="410" r="130" fill="#cff9fe" opacity="0.55"/>

  <!-- big rounded panel -->
  <g filter="url(#ab-shadow)">
    <rect x="120" y="110" width="400" height="300" rx="26" fill="#ffffff"/>
  </g>

  <!-- window toolbar -->
  <rect x="120" y="110" width="400" height="52" rx="26" fill="#f6f8fb"/>
  <rect x="120" y="140" width="400" height="22" fill="#f6f8fb"/>
  <circle cx="150" cy="136" r="5" fill="#ff6b6b"/>
  <circle cx="170" cy="136" r="5" fill="#ffcf5c"/>
  <circle cx="190" cy="136" r="5" fill="#4ad991"/>

  <!-- kanban columns -->
  <rect x="146" y="186" width="108" height="196" rx="14" fill="#f6f8fb"/>
  <rect x="266" y="186" width="108" height="196" rx="14" fill="#f6f8fb"/>
  <rect x="386" y="186" width="108" height="196" rx="14" fill="#f6f8fb"/>

  <rect x="160" y="202" width="60" height="8" rx="4" fill="#93b4ff"/>
  <rect x="280" y="202" width="60" height="8" rx="4" fill="#66e4f9"/>
  <rect x="400" y="202" width="60" height="8" rx="4" fill="#c2ccdb"/>

  <!-- cards -->
  <rect x="160" y="222" width="80" height="46" rx="10" fill="#ffffff" stroke="#dde3ec"/>
  <rect x="170" y="234" width="46" height="6" rx="3" fill="#2544e0"/>
  <rect x="170" y="248" width="60" height="6" rx="3" fill="#dde3ec"/>

  <rect x="160" y="278" width="80" height="46" rx="10" fill="#ffffff" stroke="#dde3ec"/>
  <rect x="170" y="290" width="40" height="6" rx="3" fill="#06b0d4"/>
  <rect x="170" y="304" width="58" height="6" rx="3" fill="#dde3ec"/>

  <rect x="280" y="222" width="80" height="46" rx="10" fill="#ffffff" stroke="#dde3ec"/>
  <rect x="290" y="234" width="52" height="6" rx="3" fill="#2544e0"/>
  <rect x="290" y="248" width="44" height="6" rx="3" fill="#dde3ec"/>

  <rect x="400" y="222" width="80" height="46" rx="10" fill="#ffffff" stroke="#dde3ec"/>
  <rect x="410" y="234" width="48" height="6" rx="3" fill="#21cdee"/>
  <rect x="410" y="248" width="56" height="6" rx="3" fill="#dde3ec"/>

  <!-- floating avatars -->
  <g filter="url(#ab-shadow)">
    <circle cx="500" cy="150" r="34" fill="#ffffff"/>
  </g>
  <circle cx="500" cy="150" r="26" fill="url(#ab-brand)"/>
  <circle cx="500" cy="141" r="8" fill="#ffffff"/>
  <path d="M486 164a14 14 0 0 1 28 0z" fill="#ffffff"/>

  <g filter="url(#ab-shadow)">
    <circle cx="150" cy="392" r="30" fill="#ffffff"/>
  </g>
  <circle cx="150" cy="392" r="22" fill="url(#ab-accent)"/>
  <circle cx="150" cy="384" r="7" fill="#ffffff"/>
  <path d="M138 404a12 12 0 0 1 24 0z" fill="#ffffff"/>

  <!-- connecting dashed line -->
  <path d="M180 380 C 300 300, 380 240, 476 168" stroke="#93b4ff" stroke-width="2.5" stroke-dasharray="4 8" stroke-linecap="round"/>
</svg>
