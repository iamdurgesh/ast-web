<section class="page-header" data-header-dark>
  <div class="page-header__bg" aria-hidden="true">
    <span class="page-header__glow"></span>
  </div>
  <div class="container page-header__inner">
    <nav class="page-header__crumbs" aria-label="Breadcrumb">
      <a routerLink="/">Home</a>
      <span aria-hidden="true">/</span>
      <span class="page-header__crumb-current">{{ crumb() || title() }}</span>
    </nav>

    @if (eyebrow()) {
      <span class="eyebrow page-header__eyebrow">{{ eyebrow() }}</span>
    }
    <h1 class="page-header__title">{{ title() }}</h1>
    @if (subtitle()) {
      <p class="page-header__subtitle">{{ subtitle() }}</p>
    }
  </div>
</section>
